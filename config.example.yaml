server:
  api_url: "http://localhost:4000"
  livekit_url: "ws://localhost:7880"
  claim_token: "PASTE_YOUR_CLAIM_TOKEN_HERE"

camera:
  width: 1280
  height: 720
  fps: 30
  device: "/dev/video0"
  pipeline: "opencv"
  backend: "v4l2"
  fourcc: "MJPG"
  buffer_size: 1
  warmup_frames: 4

controls:
  gpio_enabled: false
  motor_left_forward: 17
  motor_left_backward: 18
  motor_right_forward: 22
  motor_right_backward: 23

hardware:
  type: "none"
  options: {}

